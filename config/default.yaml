# Proton Agent Platform - Default Configuration

server:
  host: "0.0.0.0"
  port: 8000
  debug: false

# Default execution settings
execution:
  max_depth: 10
  total_timeout: 300  # seconds
  layer_timeout: 60   # seconds
  error_strategy: "fail_fast"  # fail_fast, continue, retry

# Default agent settings
agent:
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 4096
  provider: "openai"  # openai, azure, anthropic

# Copilot settings (for AI-assisted workflow generation)
copilot:
  enabled: true
  provider: "openai"  # openai, azure, anthropic, ollama, custom
  model: "gpt-4"
  # API key can also be set via COPILOT_API_KEY or OPENAI_API_KEY env vars
  api_key: ""
  # Base URL for custom/local providers (e.g., Ollama, vLLM, LocalAI)
  base_url: ""  # e.g., "http://localhost:11434/v1" for Ollama
  temperature: 0.7
  max_tokens: 4096

# Plugin settings
plugins:
  mcp:
    enabled: true
    timeout: 30
  skill:
    enabled: true
    approval_default: false
  rag:
    enabled: true
    default_top_k: 5

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Storage (for future persistence)
storage:
  type: "memory"  # memory, sqlite, postgresql
  # connection_string: "sqlite:///proton.db"
